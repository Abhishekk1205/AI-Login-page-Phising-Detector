version: "3.9"

services:
  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: phishdetect-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - phishdetect-net

  # ── AI Engine (Python Flask) ──────────────────────────────────────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: phishdetect-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - FLASK_ENV=production
    networks:
      - phishdetect-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Backend (Node.js Express) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phishdetect-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/phishdetect
      - AI_ENGINE_URL=http://ai-engine:8000
      - FRONTEND_URL=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      - mongodb
      - ai-engine
    networks:
      - phishdetect-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: phishdetect-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - phishdetect-net

volumes:
  mongo_data:

networks:
  phishdetect-net:
    driver: bridge
